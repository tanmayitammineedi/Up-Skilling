<html>
<head>
    <title>Event Registration Form</title>
    <style>
        form {
            width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid black;
            background-color: #f2f2f2;
        }
        input, select, textarea {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
        }
    </style>
</head>
<body>
    <h2>Event Registration Form</h2>
    <form onsubmit="document.getElementById('result').value='Registration Successful!';return false;">
        <label>Name</label>
        <input type="text" placeholder="Enter your name" required autofocus>
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
        <label>Date</label>
        <input type="date" required>
        <label>Event Type</label>
        <select required>
            <option value="">Select Event</option>
            <option>Tree Plantation</option>
            <option>Health Camp</option>
            <option>Cultural Festival</option>
        </select>
        <label>Message</label>
        <textarea placeholder="Enter your message" required></textarea>
        <button type="submit">Register</button>
    </form>
    <output id="result"></output>
</body>
</html>
