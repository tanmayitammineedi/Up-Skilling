<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h2>Welcome, User!</h2>
        <p class="highlight">You have successfully logged in.</p>
        <p>
            Special Offer:
            <span style="color: red; font-weight: bold;">
                Get 20% off on event registration!
            </span>
        </p>
    </div>

    <p class="highlight">Don't miss the upcoming community events.</p>

</body>
</html>
