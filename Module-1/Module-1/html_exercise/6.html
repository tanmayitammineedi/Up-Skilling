<html>
<head>
    <title>Event Feedback Form</title>
    <style>
        form {
            width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid black;
            background-color: #f2f2f2;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        #imgBox {
            width: 150px;
            transition: 0.3s;
        }
        #imgBox.big {
            width: 300px;
        }
        #msg {
            color: green;
            font-weight: bold;
        }
    </style>

    <script>
        function validatePhone() {
            let phone = document.getElementById("phone").value;
            if (phone.length != 10 || isNaN(phone)) {
                alert("Enter valid 10-digit phone number");
            }
        }

        function showFee() {
            let event = document.getElementById("event").value;
            let fee = document.getElementById("fee");

            if (event == "tree") fee.innerHTML = "Fee: 100";
            else if (event == "health") fee.innerHTML = "Fee: 200";
            else if (event == "cultural") fee.innerHTML = "Fee: 300";
        }

        function confirmSubmit() {
            document.getElementById("msg").innerHTML = "Form Submitted Successfully!";
        }

        function enlargeImage() {
            let img = document.getElementById("imgBox");
            img.classList.toggle("big");
        }

        function countChars() {
            let text = document.getElementById("feedback").value;
            document.getElementById("count").innerHTML = text.length;
        }
    </script>
</head>

<body>
    <form>
        <h2>Event Feedback</h2>

        <label>Phone Number</label>
        <input type="text" id="phone" onblur="validatePhone()" placeholder="Enter phone number">

        <label>Select Event</label>
        <select id="event" onchange="showFee()">
            <option value="">Choose</option>
            <option value="tree">Tree Plantation</option>
            <option value="health">Health Camp</option>
            <option value="cultural">Cultural Event</option>
        </select>

        <p id="fee">Fee: </p>

        <label>Feedback</label>
        <textarea id="feedback" onkeyup="countChars()" placeholder="Write feedback"></textarea>
        <p>Characters: <span id="count">0</span></p>

        <img src="OIP.webp" id="imgBox" ondblclick="enlargeImage()" alt="Blood Donation Camp">

        <button type="button" onclick="confirmSubmit()">Submit</button>

        <p id="msg"></p>
    </form>
</body>
</html>
