<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Registration Form</h2>

<form>

    <div class="mb-3">

        <label>Name</label>

        <input type="text"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Email</label>

        <input type="email"
               class="form-control">

    </div>

    <div class="form-check">

        <input type="checkbox"
               class="form-check-input">

        <label class="form-check-label">

            Accept Terms

        </label>

    </div>

    <button class="btn btn-primary mt-3">

        Submit

    </button>

</form>

</div>

</body>
</html>
